<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Cuaca</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      padding: 50px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }

    #hasil {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>🌦️ Website Cuaca</h1>

  <input type="text" id="kota" placeholder="Masukkan nama kota">
  <button onclick="getCuaca()">Cek Cuaca</button>

  <div id="hasil"></div>

  <script>
    function getCuaca() {
      const kota = document.getElementById("kota").value;
      const apiKey = "aaa5a409334c557264f3e6dee2ebf2b4"; //

      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${kota}&appid=${apiKey}&units=metric`)
        .then(response => response.json())
        .then(data => {
          if (data.cod !== 200) {
            document.getElementById("hasil").innerHTML = "Kota tidak ditemukan!";
            return;
          }

          const hasil = `
            <h2>${data.name}</h2>
            <p>🌡️ Suhu: ${data.main.temp}°C</p>
            <p>☁️ Cuaca: ${data.weather[0].description}</p>
          `;

          document.getElementById("hasil").innerHTML = hasil;
        })
        .catch(() => {
          document.getElementById("hasil").innerHTML = "Terjadi error!";
        });
    }
  </script>

</body>
</html>
